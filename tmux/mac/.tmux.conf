# ==============================================================================
# TMUX CONFIGURATION
# ==============================================================================
# Plugin Manager: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

# ==============================================================================
# GENERAL
# ==============================================================================
set-option -g default-shell /bin/zsh
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on
setw -g xterm-keys on
setw -g automatic-rename

# ==============================================================================
# PREFIX KEY (Ctrl+A)
# ==============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ==============================================================================
# MOUSE
# ==============================================================================
set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
unbind -n MouseDown3Pane
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
bind m set-option -g mouse \; display "Mouse: #{?mouse,ON,OFF}"
bind -n F9 set-option -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# ==============================================================================
# WINDOWS
# ==============================================================================
bind N new-window
bind -n M-n new-window
bind -n M-, new-window
bind -n M-Tab next-window
bind -n M-a previous-window
bind -n M-pagedown next-window
bind -n M-pageup previous-window
bind -n M-s next-window
bind -n M-i command-prompt -I "#W" "rename-window '%%'"
bind i command-prompt -I "#W" "rename-window '%%'"
bind -n M-W choose-tree -Zw
bind -n M-S choose-tree -Zs

# ==============================================================================
# PANES – NAVIGATION
# ==============================================================================
bind -n M-Down select-pane -D
bind -n M-J select-pane -D
bind -n M-Left select-pane -L
bind -n M-H select-pane -L
bind -n M-Right select-pane -R
bind -n M-L select-pane -R
bind -n M-Up select-pane -U
bind -n M-K select-pane -U
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ==============================================================================
# PANES – SPLIT / RESIZE / SWAP / KILL
# ==============================================================================
bind -n M-8 split-window -v
bind -n M-9 split-window -h
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Left resize-pane -L 5
bind -n M-z resize-pane -Z
bind -n M-f resize-pane -Z
bind -n C-q kill-pane
bind -n M-x kill-pane
bind -n S-F5 setw synchronize-panes
bind H splitw -fhb \; swapp -t ! \; killp -t !
bind L splitw -fh  \; swapp -t ! \; killp -t !
bind J splitw -fv  \; swapp -t ! \; killp -t !
bind K splitw -fvb \; swapp -t ! \; killp -t !
bind j swap-pane -D
bind k swap-pane -U
bind h swap-pane -s '{left-of}'
bind l swap-pane -s '{right-of}'

# ==============================================================================
# COPY / YANK
# ==============================================================================
bind-key -T copy-mode y send-keys -X copy-pipe-and-cancel "xsel -i -p && xsel -o -p | xsel -i -b"
bind-key C-y run "xsel -o | tmux load-buffer - ; tmux paste-buffer"

# ==============================================================================
# HOME / END FIX
# ==============================================================================
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# ==============================================================================
# CURSOR
# ==============================================================================
set -g terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[1 q'
set -g cursor-style blinking-bar

# ==============================================================================
# STATUS BAR
# ==============================================================================
set -g status-left ''
set -g status-left-length 0
set -g status-right '%d.%m.%Y|%H:%M'
set -g status-right-length 20

# ==============================================================================
# CONFIG RELOAD
# ==============================================================================
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded mate"

# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @continuum-restore 'on'
set -g @resurrect-processes 'btop nload journalctl yazi'

# ==============================================================================
# THEME
# ==============================================================================
source-file ~/opt/git/dotfiles_linux/tmux/mac/tmux.theme.conf

# ==============================================================================
# INITIALIZE TPM (must be after plugins and theme)
# ==============================================================================
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# PERSONAL OVERRIDES (after TPM to override theme defaults)
# ==============================================================================
set -g window-active-style 'bg=#000000'
set -g window-style 'default'
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#d79921'
